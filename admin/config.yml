backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Paramètres du site"
    files:

      # ── INFORMATIONS GÉNÉRALES ─────────────────────────────
      - label: "Informations générales"
        name: "general"
        file: "_data/settings.json"
        format: json
        fields:
          - { label: "Nom du photographe", name: "photographer_name", widget: "string", hint: "Affiché dans la nav et le hero" }
          - { label: "Sous-titre hero (ex: Photographe)", name: "hero_kicker", widget: "string" }
          - { label: "Titre principal (ex: AMR Studio)", name: "hero_title", widget: "string" }
          - { label: "Description hero", name: "hero_subtitle", widget: "text" }
          - { label: "Photo de couverture", name: "cover_image", widget: "image" }
          - { label: "Titre section aperçu", name: "overview_title", widget: "string" }
          - { label: "Texte section aperçu", name: "overview_text", widget: "text" }
          - { label: "Accroche pied de page", name: "footer_tagline", widget: "string" }
          - { label: "Texte pied de page", name: "footer_text", widget: "text" }
          - { label: "E-mail de contact", name: "email", widget: "string" }
          - { label: "URL Instagram", name: "instagram_url", widget: "string" }
          - { label: "URL LinkedIn", name: "linkedin_url", widget: "string" }
          - { label: "Description SEO (Google)", name: "meta_description", widget: "text" }

      # ── GALERIES PHOTO ────────────────────────────────────
      - label: "Galeries photo"
        name: "galleries_data"
        file: "_data/galleries.json"
        format: json
        fields:
          - label: "Liste des galeries"
            name: "galleries"
            widget: list
            allow_add: true
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "Identifiant (ex: tokyo, paris…)", name: "key", widget: "string", hint: "Unique, sans espaces ni majuscules" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre (lieu, style…)", name: "tagline", widget: "string" }
              - { label: "Description de la galerie", name: "description", widget: "text" }
              - { label: "Image de couverture (carte thème)", name: "cover", widget: "image" }
              - { label: "Miniature aperçu (grille d'accueil)", name: "overview_image", widget: "image", required: false }
              - label: "Photos"
                name: "photos"
                widget: list
                allow_add: true
                collapsed: true
                summary: "{{fields.caption}}"
                fields:
                  - { label: "Photo", name: "src", widget: "image" }
                  - { label: "Légende (optionnel)", name: "caption", widget: "string", required: false }
